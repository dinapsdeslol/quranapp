name: quran_player
description: "A Quran audio player with biometric authentication and Firebase"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  
  # Biometric
  local_auth: ^2.3.0
  
  # Audio
  audioplayers: ^6.1.0
  
  # API & HTTP
  http: ^1.2.2
  
  # Charts
  fl_chart: ^0.69.0
  
  # Storage local
  shared_preferences: ^2.3.2
  
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
